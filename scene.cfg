camera: {
    type = "camera"; // Case insensitive

    resolution = [0, 0]; // size_t
    fieldOfView = 70.0; // float

    position = [0.0, 0.0, 0.0]; // Double
    orientation = [0.0, 0.0, 0.0]; // Double
};

light: {
    type = "light"; // Case insensitive
    name = "ambient"; // Case insensitive

    intensity = 1.0; // Float (100% by default)
    color = [255, 255, 255]; // uint8_t (white by default)

    position = [0.0, 0.0, 0.0]; // Double
    orientation = [0.0, 0.0, 0.0]; // Double
};

shape: {
    type = "object"; // Case insensitive
    name = "plane"; // Case insensitive
    material = {
        name = "default"; // Case insensitive
        color = [255, 255, 255];
        transparency = 0.0; // float (transparency by default)
        reflection = 0.0; // float (no reflection by default)
        is_mirror = false; // boolean (false by default)
    };

    position = [0.0, 0.0, 0.0]; // Double
    orientation = [0.0, 0.0, 0.0]; // Double

    dimension = [0, 0]; // size_t

    radius = 0.0; // Double
};
