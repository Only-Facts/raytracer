name: Mirror Push
run-name: ${{ github.actor }}'s push
on:
  push:
    branches-ignore:
      - "ga-ignore-**"
  pull_request:
    branches-ignore:
      - "ga-ignore-**"

env:
  MIRROR_URL: git@github.com:EpitechPGE2-2025/G-OOP-400-BDX-4-1-raytracer-6.git
  MIRROR_REPO: EpitechPGE2-2025/G-OOP-400-BDX-4-1-raytracer-6
  EXECUTABLE_CMAKE: raytracer
  EXECUTABLE_CARGO: target/release/raytracer

jobs:
  check_repository:
    runs-on: ubuntu-latest
    outputs:
      same_repo: ${{ steps.repo.outputs.same_repo }}
    steps:
      - name: Check repository's name
        id: repo
        run: |
          if [[ "${{ github.repository }}" == "${{ env.MIRROR_REPO }}" ]]; then
            echo "same_repo=true" >> $GITHUB_OUTPUT
          else
            echo "same_repo=false" >> $GITHUB_OUTPUT
          fi

  check_cmake_compilation:
    name: CMake CI
    runs-on: ubuntu-latest
    timeout-minutes: 3
    container: epitechcontent/epitest-docker:latest
    needs: [check_repository]
    if: ${{ success() && needs.check_repository.outputs.same_repo == 'false' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          repository: ""

      - name: Install System Dependencies (X11, libconfig, tinyobjloader)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libudev-dev \
            libopenal-dev \
            libflac-dev \
            libvorbis-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxcb-composite0-dev \
            libxcb-cursor-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libconfig-dev \
            libconfig++-dev \
            libtinyobjloader-dev

      - name: Cache SFML 3.1.0
        id: cache-sfml
        uses: actions/cache@v4
        with:
          path: /tmp/sfml-install
          key: ${{ runner.os }}-sfml-3.1.0

      - name: Build and Install SFML 3.1.0
        if: steps.cache-sfml.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch 3.1.0 https://github.com/SFML/SFML.git
          cd SFML
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/tmp/sfml-install -DSFML_BUILD_AUDIO=ON
          cmake --build build --target install --parallel $(nproc)

      - name: Build & Compile Repo
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/tmp/sfml-install
          cmake --build build --parallel $(nproc)

      - name: Check Compilation
        run: |
          for binary in ${{ env.EXECUTABLES }}; do
            if [ ! -x "$binary" && ! -x "build/$binary" ]; then
              echo "::error::File $binary does not exist or is not executable"
              exit 1
            fi
          done

  check_cargo_compilation:
    name: Rust CI
    runs-on: ubuntu-latest
    needs: [check_repository]
    if: ${{ success() && needs.check_repository.outputs.same_repo == 'false' }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies (X11, libconfig, tinyobjloader)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libudev-dev \
            libopenal-dev \
            libflac-dev \
            libvorbis-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxcb-composite0-dev \
            libxcb-cursor-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-shm0-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libconfig-dev \
            libconfig++-dev \
            libtinyobjloader-dev

      - name: Cache SFML 3.1.0
        id: cache-sfml
        uses: actions/cache@v4
        with:
          path: /tmp/sfml-install
          key: ${{ runner.os }}-sfml-3.1.0

      - name: Build and Install SFML 3.1.0
        if: steps.cache-sfml.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth 1 --branch 3.1.0 https://github.com/SFML/SFML.git
          cd SFML
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/tmp/sfml-install -DSFML_BUILD_AUDIO=ON
          cmake --build build --target install --parallel $(nproc)

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Run cargo-deny checks
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: "check bans sources"
          manifest-path: "./Cargo.toml"
          rust-version: "1.88.0"

      - name: Pre-build project
        run: cargo build

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with Clippy
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test

  push_to_mirror:
    runs-on: ubuntu-latest
    needs: [check_cmake_compilation, check_cargo_compilation]
    if: ${{ github.event_name == 'push' && success() }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{env.MIRROR_URL}}
          ssh_private_key: ${{secrets.GIT_SSH_PRIVATE_KEY}}
